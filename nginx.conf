server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;
	error_page 404 /404.html;

	location / {
		try_files $uri $uri/ =404;
	}

	location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
		try_files $uri =404;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}
}
